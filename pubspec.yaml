name: sentinel_app
description: "IoT Trust Monitor - Real-time IoT security monitoring dashboard."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  fl_chart: ^0.69.0
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - logo.png

# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0A0A"
  color_dark: "#0A0A0A"
  image: logo.png
  fullscreen: true
  android_12:
    color: "#0A0A0A"
    image: logo.png
    icon_background_color: "#0A0A0A"
